    inputDefinitions:
      parameters:
        failure_rate:
          defaultValue: 0.3
          isOptional: true
          parameterType: NUMBER_DOUBLE
        service_name:
          defaultValue: external_api
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-simulate-unreliable-service-2:
    executorLabel: exec-simulate-unreliable-service-2
    inputDefinitions:
      parameters:
        failure_rate:
          defaultValue: 0.3
          isOptional: true
          parameterType: NUMBER_DOUBLE
        service_name:
          defaultValue: external_api
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-validate-data-quality:
    executorLabel: exec-validate-data-quality
    inputDefinitions:
      artifacts:
        data_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        max_null_percentage:
          defaultValue: 20.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        min_rows:
          defaultValue: 10.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: BOOLEAN
deploymentSpec:
  executors:
    exec-adaptive-data-processing:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - adaptive_data_processing
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' 'psutil'\
          \ 'numpy' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef adaptive_data_processing(\n    data_path: InputPath(),\n    output_path:\
          \ OutputPath(),\n    min_memory_gb: float = 1.0,\n    target_memory_gb:\
          \ float = 4.0\n) -> Dict[str, Any]:\n    \"\"\"\n    Process data with graceful\
          \ degradation based on available resources.\n    Adapts processing complexity\
          \ based on memory availability.\n    \"\"\"\n    import psutil\n    import\
          \ pandas as pd\n    import numpy as np\n    import json\n\n    # Check available\
          \ memory\n    memory_info = psutil.virtual_memory()\n    available_gb =\
          \ memory_info.available / (1024**3)\n    total_gb = memory_info.total /\
          \ (1024**3)\n\n    print(f\"Memory: {available_gb:.2f}GB available / {total_gb:.2f}GB\
          \ total\")\n\n    try:\n        # Try to load data\n        with open(data_path,\
          \ 'r') as f:\n            content = f.read()\n\n        # Simulate different\
          \ data formats\n        if content.startswith('{'):\n            # JSON\
          \ data\n            data = json.loads(content)\n            df = pd.DataFrame([data]\
          \ if isinstance(data, dict) else data)\n        else:\n            # Assume\
          \ CSV-like data\n            lines = content.strip().split('\\n')\n    \
          \        df = pd.DataFrame([line.split(',') for line in lines])\n\n    \
          \    print(f\"Loaded data: {len(df)} rows, {len(df.columns)} columns\")\n\
          \n    except Exception as e:\n        print(f\"Failed to load data: {e}\"\
          )\n        # Create minimal fallback data\n        df = pd.DataFrame({'col1':\
          \ [1, 2, 3], 'col2': [4, 5, 6]})\n\n    # Adaptive processing based on available\
          \ memory\n    if available_gb >= target_memory_gb:\n        # Full processing\
          \ - complex operations\n        print(\"\U0001F680 Full processing mode\"\
          )\n        try:\n            df['complex_feature_1'] = df.iloc[:, 0].astype(float)\
          \ * df.iloc[:, 1].astype(float)\n            df['complex_feature_2'] = np.sqrt(df.iloc[:,\
          \ 0].astype(float) ** 2 + df.iloc[:, 1].astype(float) ** 2)\n          \
          \  df['statistical_feature'] = df.iloc[:, 0].astype(float).rolling(window=3).mean()\n\
          \            quality_score = 1.0\n            strategy = \"full\"\n    \
          \    except Exception as e:\n            print(f\"Full processing failed:\
          \ {e}, falling back to basic\")\n            df['basic_feature'] = df.iloc[:,\
          \ 0].astype(str) + \"_processed\"\n            quality_score = 0.7\n   \
          \         strategy = \"degraded_from_full\"\n\n    elif available_gb >=\
          \ min_memory_gb:\n        # Basic processing - simpler operations\n    \
          \    print(\"\u26A1 Basic processing mode\")\n        try:\n           \
          \ df['basic_feature'] = df.iloc[:, 0].astype(str) + \"_basic\"\n       \
          \     if len(df.columns) > 1:\n                df['sum_feature'] = pd.to_numeric(df.iloc[:,\
          \ 0], errors='coerce').fillna(0) + \\\n                                \
          \   pd.to_numeric(df.iloc[:, 1], errors='coerce').fillna(0)\n          \
          \  quality_score = 0.7\n            strategy = \"basic\"\n        except\
          \ Exception as e:\n            print(f\"Basic processing failed: {e}, falling\
          \ back to minimal\")\n            df['minimal_feature'] = \"processed\"\n\
          \            quality_score = 0.3\n            strategy = \"degraded_from_basic\"\
          \n\n    else:\n        # Minimal processing - just pass through with basic\
          \ validation\n        print(\"\U0001F527 Minimal processing mode\")\n  \
          \      df['minimal_feature'] = \"minimal_processed\"\n        quality_score\
          \ = 0.3\n        strategy = \"minimal\"\n\n    # Save processed data\n \
          \   df.to_csv(output_path, index=False)\n\n    return {\n        \"quality_score\"\
          : quality_score,\n        \"strategy\": strategy,\n        \"rows_processed\"\
          : len(df),\n        \"columns_created\": len([col for col in df.columns\
          \ if 'feature' in col]),\n        \"available_memory_gb\": round(available_gb,\
          \ 2),\n        \"memory_utilization\": round((total_gb - available_gb) /\
          \ total_gb * 100, 2)\n    }\n\n"
        image: python:3.11
        resources:
          cpuLimit: 2.0
          memoryLimit: 4.294967296
          resourceCpuLimit: '2'
          resourceMemoryLimit: 4Gi
    exec-adaptive-data-processing-2:
      container:
        args:
        - --executor_input
