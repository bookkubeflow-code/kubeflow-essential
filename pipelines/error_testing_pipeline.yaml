# PIPELINE DEFINITION
# Name: error-scenario-testing-pipeline
# Description: Pipeline specifically designed to test different error scenarios
# Inputs:
#    failure_rate: float [Default: 0.8]
#    test_scenario: str [Default: 'network_timeout']
components:
  comp-cleanup-resources:
    executorLabel: exec-cleanup-resources
    inputDefinitions:
      parameters:
        temp_prefix:
          defaultValue: pipeline_temp_
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-exit-handler-1: {}
  comp-fetch-data-with-retry:
    executorLabel: exec-fetch-data-with-retry
    inputDefinitions:
      parameters:
        max_retries:
          defaultValue: 3.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        timeout_seconds:
          defaultValue: 30.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        url:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
deploymentSpec:
  executors:
    exec-cleanup-resources:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cleanup_resources
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cleanup_resources(\n    temp_prefix: str = \"pipeline_temp_\"\
          \n) -> Dict[str, Any]:\n    \"\"\"\n    Clean up temporary files and resources.\n\
          \    This runs in exit handlers regardless of pipeline success/failure.\n\
          \    \"\"\"\n    import os\n    import glob\n    import tempfile\n\n   \
          \ cleanup_count = 0\n    errors = []\n\n    # Clean up temporary files\n\
          \    temp_patterns = [\n        f\"/tmp/{temp_prefix}*\",\n        f\"{tempfile.gettempdir()}/{temp_prefix}*\"\
          \n    ]\n\n    for pattern in temp_patterns:\n        try:\n           \
          \ temp_files = glob.glob(pattern)\n            for file_path in temp_files:\n\
          \                try:\n                    if os.path.isfile(file_path):\n\
          \                        os.remove(file_path)\n                        cleanup_count\
          \ += 1\n                        print(f\"\U0001F5D1\uFE0F  Removed {file_path}\"\
          )\n                    elif os.path.isdir(file_path):\n                \
          \        os.rmdir(file_path)\n                        cleanup_count += 1\n\
          \                        print(f\"\U0001F5D1\uFE0F  Removed directory {file_path}\"\
          )\n                except Exception as e:\n                    error_msg\
          \ = f\"Failed to remove {file_path}: {e}\"\n                    errors.append(error_msg)\n\
          \                    print(f\"\u26A0\uFE0F  {error_msg}\")\n        except\
          \ Exception as e:\n            error_msg = f\"Failed to glob pattern {pattern}:\
          \ {e}\"\n            errors.append(error_msg)\n            print(f\"\u26A0\
          \uFE0F  {error_msg}\")\n\n    # Simulate other cleanup operations\n    print(\"\
          \U0001F9F9 Performing additional cleanup...\")\n    print(\"   - Closing\
          \ database connections\")\n    print(\"   - Releasing memory caches\")\n\
          \    print(\"   - Finalizing logs\")\n\n    return {\n        \"files_cleaned\"\
          : cleanup_count,\n        \"errors\": errors,\n        \"cleanup_successful\"\
          : len(errors) == 0\n    }\n\n"
        image: python:3.11
    exec-fetch-data-with-retry:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - fetch_data_with_retry
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'requests' 'pandas'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef fetch_data_with_retry(\n    url: str,\n    output_path: OutputPath(),\n\
          \    max_retries: int = 3,\n    timeout_seconds: int = 30\n) -> Dict[str,\
          \ Any]:\n    \"\"\"\n    Fetch data from API with exponential backoff and\
          \ jitter.\n    Demonstrates handling of transient network errors.\n    \"\
          \"\"\n    import time\n    import random\n    import requests\n    import\
          \ json\n\n    print(f\"Fetching data from {url} with max {max_retries} retries\"\
          )\n\n    for attempt in range(max_retries):\n        try:\n            print(f\"\
          Attempt {attempt + 1}/{max_retries}\")\n            response = requests.get(url,\
          \ timeout=timeout_seconds)\n            response.raise_for_status()\n\n\
          \            # Write successful response to output\n            with open(output_path,\
          \ 'w') as f:\n                f.write(response.text)\n\n            return\
          \ {\n                \"status\": \"success\",\n                \"attempts\"\
          : attempt + 1,\n                \"data_size\": len(response.text),\n   \
          \             \"error_category\": None\n            }\n\n        except\
          \ requests.exceptions.Timeout as e:\n            error_category = \"transient\"\
          \n            print(f\"Timeout error on attempt {attempt + 1}: {e}\")\n\n\
          \        except requests.exceptions.ConnectionError as e:\n            error_category\
          \ = \"transient\"\n            print(f\"Connection error on attempt {attempt\
          \ + 1}: {e}\")\n\n        except requests.exceptions.HTTPError as e:\n \
          \           if e.response.status_code >= 500:\n                error_category\
          \ = \"transient\"  # Server errors are often transient\n            else:\n\
          \                error_category = \"logic\"  # Client errors usually aren't\n\
          \            print(f\"HTTP error on attempt {attempt + 1}: {e}\")\n\n  \
          \      except Exception as e:\n            error_category = \"dependency\"\
          \n            print(f\"Unexpected error on attempt {attempt + 1}: {e}\"\
          )\n\n        # Only retry for transient errors\n        if attempt < max_retries\
          \ - 1 and error_category == \"transient\":\n            # Exponential backoff\
          \ with jitter\n            base_delay = 2 ** attempt\n            max_delay\
          \ = min(base_delay, 60)  # Cap at 60 seconds\n            jitter = random.uniform(0,\
          \ max_delay * 0.1)  # 10% jitter\n            delay = max_delay + jitter\n\
          \n            print(f\"Retrying in {delay:.2f} seconds...\")\n         \
          \   time.sleep(delay)\n        else:\n            break\n\n    # All attempts\
          \ failed\n    with open(output_path, 'w') as f:\n        f.write('{\"error\"\
          : \"failed_to_fetch\"}')\n\n    return {\n        \"status\": \"failed\"\
          ,\n        \"attempts\": max_retries,\n        \"data_size\": 0,\n     \
          \   \"error_category\": error_category\n    }\n\n"
        image: python:3.11
pipelineInfo:
  description: Pipeline specifically designed to test different error scenarios
  name: error-scenario-testing-pipeline
root:
  dag:
    tasks:
      cleanup-resources:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-cleanup-resources
        dependentTasks:
        - exit-handler-1
        inputs:
          parameters:
            pipelinechannel--test_scenario:
              componentInputParameter: test_scenario
            temp_prefix:
              runtimeValue:
                constant: test_{{$.inputs.parameters['pipelinechannel--test_scenario']}}_
        taskInfo:
          name: cleanup-resources
        triggerPolicy:
          strategy: ALL_UPSTREAM_TASKS_COMPLETED
      exit-handler-1:
        componentRef:
          name: comp-exit-handler-1
        taskInfo:
          name: exit-handler-1
      fetch-data-with-retry:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-fetch-data-with-retry
        inputs:
          parameters:
            max_retries:
              runtimeValue:
                constant: 3.0
            timeout_seconds:
              runtimeValue:
                constant: 5.0
            url:
              runtimeValue:
                constant: https://httpbin.org/delay/10
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 1
        taskInfo:
          name: fetch-data-with-retry
  inputDefinitions:
    parameters:
      failure_rate:
        defaultValue: 0.8
        isOptional: true
        parameterType: NUMBER_DOUBLE
      test_scenario:
        defaultValue: network_timeout
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.13.0
