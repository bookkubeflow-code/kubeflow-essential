          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_fallback_data(\n    output_path: OutputPath(),\n   \
          \ rows: int = 100\n) -> Dict[str, Any]:\n    \"\"\"\n    Generate synthetic\
          \ fallback data when primary data sources fail.\n    \"\"\"\n    import\
          \ pandas as pd\n    import random\n\n    print(f\"\U0001F504 Generating\
          \ {rows} rows of fallback data\")\n\n    # Generate synthetic data\n   \
          \ data = {\n        'id': range(1, rows + 1),\n        'value1': [random.uniform(0,\
          \ 100) for _ in range(rows)],\n        'value2': [random.uniform(0, 50)\
          \ for _ in range(rows)],\n        'category': [random.choice(['A', 'B',\
          \ 'C']) for _ in range(rows)],\n        'is_synthetic': [True] * rows\n\
          \    }\n\n    df = pd.DataFrame(data)\n    df.to_csv(output_path, index=False)\n\
          \n    return {\n        \"rows_generated\": rows,\n        \"data_source\"\
          : \"synthetic\",\n        \"quality_score\": 0.5,  # Lower quality since\
          \ it's synthetic\n        \"columns\": list(df.columns)\n    }\n\n"
