# PIPELINE DEFINITION
# Name: advanced-storage-pipeline
# Description: Production-ready pipeline demonstrating all Pipeline State and Storage patterns with focused components
# Inputs:
#    batch_size: int [Default: 5000.0]
#    chunk_size: int [Default: 8000.0]
#    cleanup_days: int [Default: 7.0]
#    data_version: str [Default: '1.0.0']
#    enable_cleanup: bool [Default: False]
#    model_version: str [Default: '1.0.0']
#    num_rows: int [Default: 25000.0]
#    processing_version: str [Default: '2.0.0']
components:
  comp-checkpointing-demo:
    executorLabel: exec-checkpointing-demo
    inputDefinitions:
      parameters:
        batch_size:
          defaultValue: 5000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        num_rows:
          defaultValue: 25000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        processing_version:
          defaultValue: 2.0.0
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_checkpoint:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        output_processed_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-kubeflow-artifact-system-demo:
    executorLabel: exec-kubeflow-artifact-system-demo
    inputDefinitions:
      parameters:
        data_version:
          defaultValue: 1.0.0
          isOptional: true
          parameterType: STRING
        num_rows:
          defaultValue: 25000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-lifecycle-management-demo:
    executorLabel: exec-lifecycle-management-demo
    inputDefinitions:
      parameters:
        cleanup_days:
          defaultValue: 7.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        enable_cleanup:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
    outputDefinitions:
      artifacts:
        output_cleanup_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-model-artifacts-demo:
    executorLabel: exec-model-artifacts-demo
    inputDefinitions:
      parameters:
        model_version:
          defaultValue: 1.0.0
          isOptional: true
          parameterType: STRING
        num_samples:
          defaultValue: 10000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_metrics:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        output_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-streaming-performance-demo:
    executorLabel: exec-streaming-performance-demo
    inputDefinitions:
      parameters:
        chunk_size:
          defaultValue: 8000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        num_rows:
          defaultValue: 25000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_performance_report:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-versioned-transformation-demo:
    executorLabel: exec-versioned-transformation-demo
    inputDefinitions:
      parameters:
        num_rows:
          defaultValue: 25000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        processing_version:
          defaultValue: 2.0.0
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_transformed_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
deploymentSpec:
  executors:
    exec-checkpointing-demo:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - checkpointing_demo
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.4.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' 'pyarrow'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef checkpointing_demo(\n    output_checkpoint: Output[Artifact],\n\
          \    output_processed_data: Output[Dataset],\n    num_rows: int = 25000,\n\
          \    batch_size: int = 5000,\n    processing_version: str = \"2.0.0\"\n\
          ) -> Dict[str, str]:\n    \"\"\"\n    Component 2: Checkpointing for Resumable\
          \ Processing\n\n    Demonstrates the critical lesson from the document:\
          \ \"I learned this lesson \n    watching a critical pipeline fail after\
          \ processing for 14 hours straight. \n    We had no intermediate state saved,\
          \ no way to resume from where it crashed.\"\n    \"\"\"\n    import pandas\
          \ as pd\n    import numpy as np\n    import json\n    import time\n    from\
          \ datetime import datetime\n\n    print(\"=\" * 70)\n    print(\"COMPONENT\
          \ 2: CHECKPOINTING FOR RESUMABLE PROCESSING\")\n    print(\"=\" * 70)\n\
          \    print(\"Implementing state management for long-running processes...\"\
          )\n    print(f\"Processing version: {processing_version}\")\n    print(f\"\
          Batch size: {batch_size:,}\")\n\n    # Generate data (in real scenario,\
          \ this would be loaded from previous component)\n    np.random.seed(42)\n\
          \    df = pd.DataFrame({\n        'id': range(num_rows),\n        'feature_1':\
          \ np.random.normal(0, 1, num_rows),\n        'feature_2': np.random.exponential(2,\
          \ num_rows),\n        'target': np.random.choice([0, 1], num_rows, p=[0.7,\
          \ 0.3])\n    })\n\n    # Add missing values\n    missing_indices = np.random.choice(num_rows,\
          \ size=int(num_rows * 0.05), replace=False)\n    df.loc[missing_indices,\
          \ 'feature_1'] = np.nan\n\n    print(f\"Processing {len(df):,} rows in batches\
          \ of {batch_size:,}\")\n\n    # Initialize checkpoint data - this is the\
          \ key for resumability\n    checkpoint_data = {\n        \"version\": processing_version,\n\
          \        \"total_rows\": len(df),\n        \"processed_rows\": 0,\n    \
          \    \"batches_completed\": 0,\n        \"start_time\": datetime.now().isoformat(),\n\
          \        \"processing_stats\": [],\n        \"resumable\": True,\n     \
          \   \"failure_recovery\": \"Can resume from last successful batch\"\n  \
          \  }\n\n    processed_chunks = []\n\n    # Process in batches with checkpointing\
          \ - simulates 14-hour pipeline scenario\n    for i in range(0, len(df),\
          \ batch_size):\n        batch_start = time.time()\n\n        end_idx = min(i\
          \ + batch_size, len(df))\n        batch = df.iloc[i:end_idx].copy()\n\n\
          \        batch_num = i // batch_size + 1\n        print(f\"Processing batch\
          \ {batch_num}: rows {i:,} to {end_idx-1:,}\")\n\n        # Simulate processing\
          \ work (cleaning, transforming, etc.)\n        batch['feature_1_processed']\
          \ = batch['feature_1'].fillna(batch['feature_1'].mean())\n        batch['feature_2_log']\
          \ = batch['feature_2'].apply(lambda x: x if x > 0 else 0.001).apply(lambda\
          \ x: x**0.5)\n        batch['feature_interaction'] = batch['feature_1_processed']\
          \ * batch['feature_2_log']\n\n        # Add processing metadata\n      \
          \  batch['batch_id'] = batch_num\n        batch['processed_at'] = datetime.now().isoformat()\n\
          \        batch['processing_version'] = processing_version\n\n        processed_chunks.append(batch)\n\
          \n        # Update checkpoint after each batch - THIS IS THE KEY FOR RESUMABILITY\n\
          \        batch_time = time.time() - batch_start\n        checkpoint_data[\"\
          processed_rows\"] = end_idx\n        checkpoint_data[\"batches_completed\"\
          ] = batch_num\n        checkpoint_data[\"last_checkpoint\"] = datetime.now().isoformat()\n\
          \        checkpoint_data[\"processing_stats\"].append({\n            \"\
          batch_id\": batch_num,\n            \"rows_in_batch\": len(batch),\n   \
          \         \"processing_time_seconds\": round(batch_time, 3),\n         \
          \   \"timestamp\": datetime.now().isoformat(),\n            \"cumulative_rows\"\
          : end_idx\n        })\n\n        # Save checkpoint after each batch - enables\
          \ resumability\n        with open(output_checkpoint.path, 'w') as f:\n \
          \           json.dump(checkpoint_data, f, indent=2)\n\n        print(f\"\
          \    Checkpoint saved: {end_idx:,}/{len(df):,} rows ({end_idx/len(df)*100:.1f}%)\"\
          )\n\n        # Simulate processing time (scaled down from real 14-hour scenario)\n\
          \        time.sleep(0.02)\n\n    # Combine all processed chunks\n    final_df\
          \ = pd.concat(processed_chunks, ignore_index=True)\n\n    # Save final processed\
          \ data\n    final_df.to_parquet(output_processed_data.path, index=False)\n\
          \n    # Final checkpoint update\n    checkpoint_data[\"completion_time\"\
          ] = datetime.now().isoformat()\n    checkpoint_data[\"status\"] = \"completed\"\
          \n    checkpoint_data[\"final_shape\"] = list(final_df.shape)\n\n    with\
          \ open(output_checkpoint.path, 'w') as f:\n        json.dump(checkpoint_data,\
          \ f, indent=2)\n\n    total_time = sum(stat[\"processing_time_seconds\"\
          ] for stat in checkpoint_data[\"processing_stats\"])\n\n    print(f\"\\\
          n CHECKPOINTING KEY BENEFITS:\")\n    print(f\"    Total batches: {checkpoint_data['batches_completed']}\"\
          )\n    print(f\"    Processing time: {total_time:.2f} seconds\")\n    print(f\"\
          \    Average batch time: {total_time/checkpoint_data['batches_completed']:.3f}s\"\
          )\n    print(f\"    RESUMABILITY: If pipeline fails at batch N, restart\
          \ from batch N\")\n    print(f\"    SAVES HOURS: No need to reprocess completed\
          \ batches\")\n    print(f\"    COST EFFECTIVE: Avoid expensive recomputation\"\
          )\n\n    return {\n        \"status\": \"completed\",\n        \"processing_version\"\
          : processing_version,\n        \"total_rows\": str(len(final_df)),\n   \
          \     \"batches_completed\": str(checkpoint_data[\"batches_completed\"]),\n\
          \        \"processing_time_seconds\": str(round(total_time, 2)),\n     \
          \   \"resumable\": \"true\",\n        \"checkpoint_frequency\": f\"every_{batch_size}_rows\"\
          \n    }\n\n"
        image: python:3.11.13
        resources:
          cpuLimit: 1.0
          memoryLimit: 2.147483648
    exec-kubeflow-artifact-system-demo:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - kubeflow_artifact_system_demo
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.4.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' 'pyarrow'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef kubeflow_artifact_system_demo(\n    output_dataset: Output[Dataset],\n\
          \    num_rows: int = 25000,\n    data_version: str = \"1.0.0\"\n) -> Dict[str,\
          \ str]:\n    \"\"\"\n    Component 1: Kubeflow Artifact System Demonstration\n\
          \n    Shows how Kubeflow handles artifacts through an abstraction layer\
          \ that manages \n    storage and lineage tracking automatically. Demonstrates\
          \ the core concept from \n    the document where you work with simple paths\
          \ while Kubeflow handles complexity.\n    \"\"\"\n    import pandas as pd\n\
          \    import numpy as np\n    from datetime import datetime\n\n    print(\"\
          =\" * 70)\n    print(\"COMPONENT 1: KUBEFLOW ARTIFACT SYSTEM DEMONSTRATION\"\
          )\n    print(\"=\" * 70)\n    print(\"Demonstrating automatic storage and\
          \ lineage tracking...\")\n    print(f\"Data version: {data_version}\")\n\
          \    print(f\"Rows to generate: {num_rows}\")\n\n    # Generate realistic\
          \ dataset\n    np.random.seed(42)\n    data = {\n        'id': range(num_rows),\n\
          \        'feature_1': np.random.normal(0, 1, num_rows),\n        'feature_2':\
          \ np.random.exponential(2, num_rows),\n        'feature_3': np.random.choice(['A',\
          \ 'B', 'C'], num_rows),\n        'target': np.random.choice([0, 1], num_rows,\
          \ p=[0.7, 0.3]),\n        'timestamp': pd.date_range('2024-01-01', periods=num_rows,\
          \ freq='1min'),\n        'data_version': data_version,\n        'created_at':\
          \ datetime.now().isoformat()\n    }\n\n    df = pd.DataFrame(data)\n\n \
          \   # Add some missing values for realistic processing\n    missing_indices\
          \ = np.random.choice(num_rows, size=int(num_rows * 0.05), replace=False)\n\
          \    df.loc[missing_indices, 'feature_1'] = np.nan\n\n    print(f\"\\nDataset\
          \ Generation Complete:\")\n    print(f\"   Shape: {df.shape}\")\n    print(f\"\
          \   Missing values: {df.isnull().sum().sum()}\")\n    print(f\"   Data types:\
          \ {len(df.dtypes.unique())} different types\")\n    print(f\"   Memory usage:\
          \ {df.memory_usage(deep=True).sum() / 1024 / 1024:.1f} MB\")\n\n    # Write\
          \ to Kubeflow-managed path - this is the key demonstration\n    df.to_parquet(output_dataset.path,\
          \ index=False)\n\n    print(f\"\\nKUBEFLOW ARTIFACT SYSTEM KEY POINTS:\"\
          )\n    print(f\"   Kubeflow provides: {output_dataset.path}\")\n    print(f\"\
          \   You just write to the path - Kubeflow handles:\")\n    print(f\"   \
          \  - Automatic upload to storage backend (MinIO/S3/GCS)\")\n    print(f\"\
          \     - Metadata tracking in database\")\n    print(f\"     - Lineage and\
          \ provenance tracking\")\n    print(f\"     - URI management and access\
          \ control\")\n    print(f\"   No manual credential or URL management needed!\"\
          )\n\n    return {\n        \"status\": \"completed\",\n        \"data_version\"\
          : data_version,\n        \"rows_generated\": str(num_rows),\n        \"\
          columns_created\": str(len(df.columns)),\n        \"missing_values\": str(df.isnull().sum().sum()),\n\
          \        \"memory_mb\": str(round(df.memory_usage(deep=True).sum() / 1024\
          \ / 1024, 1)),\n        \"artifact_path\": output_dataset.path\n    }\n\n"
        image: python:3.11.13
        resources:
          cpuLimit: 1.0
          memoryLimit: 2.147483648
    exec-lifecycle-management-demo:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - lifecycle_management_demo
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.4.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' &&\
          \ \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef lifecycle_management_demo(\n    output_cleanup_report: Output[Artifact],\n\
          \    cleanup_days: int = 7,\n    enable_cleanup: bool = False\n) -> Dict[str,\
          \ str]:\n    \"\"\"\n    Component 6: Artifact Lifecycle Management\n\n\
          \    Demonstrates the critical production concept: \"Production pipelines\
          \ generate \n    artifacts continuously. Without lifecycle management, storage\
          \ costs spiral \n    out of control.\" Shows how to implement cleanup as\
          \ a scheduled pipeline.\n    \"\"\"\n    import json\n    from datetime\
          \ import datetime, timedelta\n\n    print(\"=\" * 70)\n    print(\"COMPONENT\
          \ 6: ARTIFACT LIFECYCLE MANAGEMENT\")\n    print(\"=\" * 70)\n    print(\"\
          Implementing artifact cleanup and lifecycle policies...\")\n    print(f\"\
          Retention policy: {cleanup_days} days\")\n    print(f\"Cleanup mode: {'LIVE'\
          \ if enable_cleanup else 'DRY RUN'}\")\n\n    # Simulate artifact discovery\
          \ (in production, this would scan actual storage)\n    cutoff_date = datetime.now()\
          \ - timedelta(days=cleanup_days)\n\n    # Realistic artifact simulation\
          \ with various types and ages\n    simulated_artifacts = [\n        {\"\
          path\": \"/artifacts/models/old_model_v1.pkl\", \"age_days\": cleanup_days\
          \ + 2, \"size_mb\": 15.2, \"type\": \"model\"},\n        {\"path\": \"/artifacts/datasets/old_dataset_jan.parquet\"\
          , \"age_days\": cleanup_days + 5, \"size_mb\": 245.8, \"type\": \"dataset\"\
          },\n        {\"path\": \"/artifacts/checkpoints/checkpoint_failed_run_123.json\"\
          , \"age_days\": cleanup_days + 1, \"size_mb\": 0.1, \"type\": \"checkpoint\"\
          },\n        {\"path\": \"/artifacts/metrics/old_metrics_feb.json\", \"age_days\"\
          : cleanup_days + 3, \"size_mb\": 2.3, \"type\": \"metrics\"},\n        {\"\
          path\": \"/artifacts/models/recent_model_v2.pkl\", \"age_days\": cleanup_days\
          \ - 2, \"size_mb\": 18.7, \"type\": \"model\"},\n        {\"path\": \"/artifacts/datasets/current_dataset.parquet\"\
          , \"age_days\": 1, \"size_mb\": 189.3, \"type\": \"dataset\"},\n       \
          \ {\"path\": \"/artifacts/checkpoints/active_checkpoint.json\", \"age_days\"\
          : 0, \"size_mb\": 0.5, \"type\": \"checkpoint\"},\n        {\"path\": \"\
          /artifacts/metrics/recent_metrics.json\", \"age_days\": 2, \"size_mb\":\
          \ 1.8, \"type\": \"metrics\"},\n        {\"path\": \"/artifacts/temp/temp_processing_cache.parquet\"\
          , \"age_days\": cleanup_days + 10, \"size_mb\": 67.4, \"type\": \"temp\"\
          }\n    ]\n\n    # Categorize artifacts by retention policy\n    old_artifacts\
          \ = [a for a in simulated_artifacts if a[\"age_days\"] > cleanup_days]\n\
          \    kept_artifacts = [a for a in simulated_artifacts if a[\"age_days\"\
          ] <= cleanup_days]\n\n    # Calculate storage impact\n    total_size_to_delete\
          \ = sum(a[\"size_mb\"] for a in old_artifacts)\n    total_size_kept = sum(a[\"\
          size_mb\"] for a in kept_artifacts)\n\n    print(f\"\\n Artifact Analysis:\"\
          )\n    print(f\"    Total artifacts found: {len(simulated_artifacts)}\"\
          )\n    print(f\"    Old artifacts (>{cleanup_days} days): {len(old_artifacts)}\
          \ ({total_size_to_delete:.1f} MB)\")\n    print(f\"    Recent artifacts\
          \ ({cleanup_days} days): {len(kept_artifacts)} ({total_size_kept:.1f} MB)\"\
          )\n\n    # Group by artifact type for detailed reporting\n    artifact_types\
          \ = {}\n    for artifact in simulated_artifacts:\n        artifact_type\
          \ = artifact[\"type\"]\n        if artifact_type not in artifact_types:\n\
          \            artifact_types[artifact_type] = {\"count\": 0, \"size_mb\"\
          : 0, \"old_count\": 0, \"old_size_mb\": 0}\n\n        artifact_types[artifact_type][\"\
          count\"] += 1\n        artifact_types[artifact_type][\"size_mb\"] += artifact[\"\
          size_mb\"]\n\n        if artifact[\"age_days\"] > cleanup_days:\n      \
          \      artifact_types[artifact_type][\"old_count\"] += 1\n            artifact_types[artifact_type][\"\
          old_size_mb\"] += artifact[\"size_mb\"]\n\n    print(f\"\\n Breakdown by\
          \ Artifact Type:\")\n    for artifact_type, stats in artifact_types.items():\n\
          \        print(f\"    {artifact_type.upper()}: {stats['count']} total ({stats['size_mb']:.1f}MB),\
          \ \"\n              f\"{stats['old_count']} old ({stats['old_size_mb']:.1f}MB)\"\
          )\n\n    # Execute cleanup policy\n    if enable_cleanup:\n        print(f\"\
          \\n  EXECUTING LIVE CLEANUP:\")\n        deleted_count = len(old_artifacts)\n\
          \        space_freed = total_size_to_delete\n\n        for artifact in old_artifacts:\n\
          \            print(f\"   DELETED: {artifact['path']} (age: {artifact['age_days']}\
          \ days, {artifact['size_mb']}MB)\")\n\n        print(f\"    Cleanup completed:\
          \ {deleted_count} artifacts deleted, {space_freed:.1f}MB freed\")\n\n  \
          \  else:\n        print(f\"\\n DRY RUN - No artifacts actually deleted:\"\
          )\n        deleted_count = 0\n        space_freed = 0.0\n\n        for artifact\
          \ in old_artifacts:\n            print(f\"   WOULD DELETE: {artifact['path']}\
          \ (age: {artifact['age_days']} days, {artifact['size_mb']}MB)\")\n\n   \
          \     print(f\"    To enable cleanup, set enable_cleanup=True\")\n\n   \
          \ # Create comprehensive cleanup report\n    cleanup_report = {\n      \
          \  \"cleanup_metadata\": {\n            \"cleanup_timestamp\": datetime.now().isoformat(),\n\
          \            \"retention_policy_days\": cleanup_days,\n            \"execution_mode\"\
          : \"live\" if enable_cleanup else \"dry_run\",\n            \"cutoff_date\"\
          : cutoff_date.isoformat()\n        },\n        \"artifact_summary\": {\n\
          \            \"total_artifacts_found\": len(simulated_artifacts),\n    \
          \        \"artifacts_deleted\": deleted_count,\n            \"artifacts_kept\"\
          : len(kept_artifacts),\n            \"space_freed_mb\": round(space_freed,\
          \ 1),\n            \"space_kept_mb\": round(total_size_kept, 1),\n     \
          \       \"storage_reduction_percent\": round((space_freed / (total_size_to_delete\
          \ + total_size_kept)) * 100, 1) if (total_size_to_delete + total_size_kept)\
          \ > 0 else 0\n        },\n        \"artifact_types_breakdown\": artifact_types,\n\
          \        \"cleanup_policy\": {\n            \"description\": f\"Delete artifacts\
          \ older than {cleanup_days} days\",\n            \"scope\": \"All artifact\
          \ types included\",\n            \"exceptions\": \"Active pipeline artifacts\
          \ are protected\",\n            \"schedule_recommendation\": \"Run daily\
          \ as scheduled pipeline\"\n        },\n        \"detailed_artifacts\": {\n\
          \            \"deleted\": old_artifacts if enable_cleanup else [],\n   \
