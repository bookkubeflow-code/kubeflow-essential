          \  df['statistical_feature'] = df.iloc[:, 0].astype(float).rolling(window=3).mean()\n\
          \            quality_score = 1.0\n            strategy = \"full\"\n    \
          \    except Exception as e:\n            print(f\"Full processing failed:\
          \ {e}, falling back to basic\")\n            df['basic_feature'] = df.iloc[:,\
          \ 0].astype(str) + \"_processed\"\n            quality_score = 0.7\n   \
          \         strategy = \"degraded_from_full\"\n\n    elif available_gb >=\
          \ min_memory_gb:\n        # Basic processing - simpler operations\n    \
          \    print(\"\u26A1 Basic processing mode\")\n        try:\n           \
          \ df['basic_feature'] = df.iloc[:, 0].astype(str) + \"_basic\"\n       \
          \     if len(df.columns) > 1:\n                df['sum_feature'] = pd.to_numeric(df.iloc[:,\
          \ 0], errors='coerce').fillna(0) + \\\n                                \
          \   pd.to_numeric(df.iloc[:, 1], errors='coerce').fillna(0)\n          \
          \  quality_score = 0.7\n            strategy = \"basic\"\n        except\
          \ Exception as e:\n            print(f\"Basic processing failed: {e}, falling\
          \ back to minimal\")\n            df['minimal_feature'] = \"processed\"\n\
          \            quality_score = 0.3\n            strategy = \"degraded_from_basic\"\
          \n\n    else:\n        # Minimal processing - just pass through with basic\
