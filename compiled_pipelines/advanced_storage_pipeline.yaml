          : \"Streaming reduces peak memory usage\",\n            \"chunk_size_impact\"\
          : f\"Larger chunks = less I/O overhead, more memory\",\n            \"optimal_chunk_size\"\
          : f\"Balance between {chunk_size//2} and {chunk_size*2} rows\",\n      \
          \      \"scalability\": \"Linear scaling with dataset size\"\n        },\n\
