# PIPELINE DEFINITION
# Name: advanced-error-handling-pipeline
# Description: Advanced error handling demonstration with production-ready patterns
# Inputs:
#    fallback_rows: int [Default: 20.0]
components:
  comp-adaptive-processing:
    executorLabel: exec-adaptive-processing
    inputDefinitions:
      artifacts:
        data_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-circuit-breaker-check:
    executorLabel: exec-circuit-breaker-check
    inputDefinitions:
      parameters:
        failure_count:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-cleanup-resources:
    executorLabel: exec-cleanup-resources
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-fetch-with-backoff:
    executorLabel: exec-fetch-with-backoff
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-generate-fallback:
    executorLabel: exec-generate-fallback
    inputDefinitions:
      parameters:
        rows:
          defaultValue: 10.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-adaptive-processing:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - adaptive_processing
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' 'psutil'\
          \ && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef adaptive_processing(data_path: InputPath(), output_path: OutputPath())\
          \ -> str:\n    \"\"\"Process data with resource-aware adaptation.\"\"\"\n\
          \    import pandas as pd\n    import psutil\n    import json\n\n    print(\"\
          Starting adaptive processing\")\n\n    # Check available memory\n    memory_info\
          \ = psutil.virtual_memory()\n    available_gb = memory_info.available /\
          \ (1024**3)\n\n    print(f\"Available memory: {int(available_gb)} GB\")\n\
          \n    try:\n        # Load data\n        with open(data_path, 'r') as f:\n\
          \            data = json.load(f)\n\n        # Create DataFrame\n       \
          \ if isinstance(data, dict):\n            df = pd.DataFrame([data])\n  \
          \      else:\n            df = pd.DataFrame(data)\n\n        print(f\"Processing\
          \ {len(df)} rows\")\n\n        # Adaptive processing based on memory\n \
          \       if available_gb > 2.0:\n            # Full processing\n        \
          \    df['processing_mode'] = 'full'\n            df['computed_field'] =\
          \ 'full_computation'\n            strategy = \"full\"\n        elif available_gb\
          \ > 1.0:\n            # Degraded processing\n            df['processing_mode']\
          \ = 'degraded'\n            strategy = \"degraded\"\n        else:\n   \
          \         # Minimal processing\n            df['processing_mode'] = 'minimal'\n\
          \            strategy = \"minimal\"\n\n        df.to_csv(output_path, index=False)\n\
          \        print(f\"Processing complete using {strategy} strategy\")\n\n \
          \       return strategy\n\n    except Exception as e:\n        print(f\"\
          Processing error: {str(e)}\")\n        # Create minimal fallback\n     \
          \   fallback_df = pd.DataFrame({'error': ['processing_failed']})\n     \
          \   fallback_df.to_csv(output_path, index=False)\n        return \"error\"\
          \n\n"
        image: python:3.11
        resources:
          memoryLimit: 2.147483648
          resourceMemoryLimit: 2Gi
    exec-circuit-breaker-check:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - circuit_breaker_check
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef circuit_breaker_check(failure_count: int = 1) -> bool:\n    \"\
          \"\"Simple circuit breaker pattern.\"\"\"\n    print(\"Circuit breaker check\"\
          )\n    print(f\"Failure count: {failure_count}\")\n\n    threshold = 3\n\
          \    circuit_open = failure_count >= threshold\n\n    if circuit_open:\n\
          \        print(\"Circuit OPEN - too many failures\")\n        return False\n\
          \    else:\n        print(\"Circuit CLOSED - service available\")\n    \
          \    return True\n\n"
        image: python:3.11
    exec-cleanup-resources:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cleanup_resources
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cleanup_resources() -> str:\n    \"\"\"Clean up temporary resources.\"\
          \"\"\n    import os\n    import glob\n\n    print(\"Starting cleanup\")\n\
          \n    try:\n        # Clean up temporary files\n        temp_files = glob.glob('/tmp/pipeline_*')\n\
          \        removed_count = 0\n\n        for temp_file in temp_files:\n   \
          \         try:\n                os.remove(temp_file)\n                removed_count\
          \ += 1\n            except:\n                pass\n\n        print(f\"Cleanup\
          \ complete - removed {removed_count} files\")\n        return \"success\"\
          \n\n    except Exception as e:\n        print(f\"Cleanup error: {str(e)}\"\
          )\n        return \"error\"\n\n"
        image: python:3.11
    exec-fetch-with-backoff:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - fetch_with_backoff
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'requests' &&\
          \ \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef fetch_with_backoff(output_path: OutputPath()) -> str:\n    \"\
          \"\"Fetch data with exponential backoff retry logic.\"\"\"\n    import time\n\
          \    import random\n    import requests\n    import json\n\n    print(\"\
          Starting data fetch with exponential backoff\")\n    max_retries = 3\n\n\
          \    for attempt in range(max_retries):\n        try:\n            print(f\"\
          Attempt {attempt + 1} of {max_retries}\")\n            response = requests.get(\"\
          https://httpbin.org/json\", timeout=30)\n            response.raise_for_status()\n\
          \n            with open(output_path, 'w') as f:\n                f.write(response.text)\n\
          \n            print(\"Fetch successful\")\n            return \"success\"\
          \n\n        except Exception as e:\n            print(f\"Attempt {attempt\
          \ + 1} failed: {str(e)}\")\n\n            if attempt < max_retries - 1:\n\
          \                # Exponential backoff with jitter\n                delay\
          \ = min(2 ** attempt, 30)  # Cap at 30 seconds\n                jitter =\
          \ random.uniform(0, delay * 0.1)\n                total_delay = delay +\
          \ jitter\n\n                print(f\"Retrying in {int(total_delay)} seconds\"\
          )\n                time.sleep(total_delay)\n\n    # All attempts failed\
          \ - create fallback data\n    fallback_data = {\"error\": \"fetch_failed\"\
          , \"fallback\": True}\n    with open(output_path, 'w') as f:\n        json.dump(fallback_data,\
          \ f)\n\n    print(\"All attempts failed - using fallback data\")\n    return\
          \ \"fallback\"\n\n"
        image: python:3.11
        resources:
          memoryLimit: 1.073741824
          resourceMemoryLimit: 1Gi
    exec-generate-fallback:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_fallback
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'pandas' &&\
          \ \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_fallback(output_path: OutputPath(), rows: int = 10)\
          \ -> str:\n    \"\"\"Generate synthetic fallback data.\"\"\"\n    import\
          \ pandas as pd\n    import random\n\n    print(f\"Generating {rows} rows\
          \ of fallback data\")\n\n    try:\n        data = []\n        for i in range(rows):\n\
          \            data.append({\n                'id': i + 1,\n             \
          \   'value': random.uniform(0, 100),\n                'category': random.choice(['A',\
          \ 'B', 'C']),\n                'source': 'fallback'\n            })\n\n\
          \        df = pd.DataFrame(data)\n        df.to_csv(output_path, index=False)\n\
          \n        print(\"Fallback data generated successfully\")\n        return\
          \ \"success\"\n\n    except Exception as e:\n        print(f\"Fallback generation\
          \ error: {str(e)}\")\n        return \"error\"\n\n"
        image: python:3.11
pipelineInfo:
  description: Advanced error handling demonstration with production-ready patterns
  name: advanced-error-handling-pipeline
root:
  dag:
    tasks:
      adaptive-processing:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-adaptive-processing
        dependentTasks:
        - fetch-with-backoff
        inputs:
          artifacts:
            data_path:
              taskOutputArtifact:
                outputArtifactKey: output_path
                producerTask: fetch-with-backoff
        taskInfo:
          name: adaptive-processing
      circuit-breaker-check:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-circuit-breaker-check
        inputs:
          parameters:
            failure_count:
              runtimeValue:
                constant: 1.0
        taskInfo:
          name: circuit-breaker-check
      cleanup-resources:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-cleanup-resources
        dependentTasks:
        - adaptive-processing
        - generate-fallback
        taskInfo:
          name: cleanup-resources
      fetch-with-backoff:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-fetch-with-backoff
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: fetch-with-backoff
      generate-fallback:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-fallback
        inputs:
          parameters:
            rows:
              componentInputParameter: fallback_rows
        taskInfo:
          name: generate-fallback
  inputDefinitions:
    parameters:
      fallback_rows:
        defaultValue: 20.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.13.0
