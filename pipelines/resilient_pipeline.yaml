          \    print(f\"Loaded data: {len(df)} rows, {len(df.columns)} columns\")\n\
          \n    except Exception as e:\n        print(f\"Failed to load data: {e}\"\
          )\n        # Create minimal fallback data\n        df = pd.DataFrame({'col1':\
