# PIPELINE DEFINITION
# Name: resilient-error-handling-pipeline
# Description: Demonstrates production error handling patterns with circuit breakers, retries, and graceful degradation
# Inputs:
#    circuit_failure_threshold: int [Default: 2.0]
#    fallback_data_rows: int [Default: 50.0]
#    max_fetch_retries: int [Default: 3.0]
#    max_null_percentage: float [Default: 15.0]
#    min_memory_gb: float [Default: 1.0]
#    min_rows: int [Default: 10.0]
#    primary_data_url: str [Default: 'https://httpbin.org/json']
#    service_failure_rate: float [Default: 0.4]
#    target_memory_gb: float [Default: 2.0]
components:
  comp-adaptive-data-processing:
    executorLabel: exec-adaptive-data-processing
    inputDefinitions:
      artifacts:
        data_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        min_memory_gb:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        target_memory_gb:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-adaptive-data-processing-2:
    executorLabel: exec-adaptive-data-processing-2
    inputDefinitions:
      artifacts:
        data_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        min_memory_gb:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        target_memory_gb:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRUCT
  comp-circuit-breaker-check:
    executorLabel: exec-circuit-breaker-check
    inputDefinitions:
      parameters:
        failure_count:
          parameterType: NUMBER_INTEGER
        failure_threshold:
          defaultValue: 3.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        recovery_window_minutes:
          defaultValue: 5.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        service_name:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-cleanup-resources:
    executorLabel: exec-cleanup-resources
    inputDefinitions:
      parameters:
        temp_prefix:
          defaultValue: pipeline_temp_
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-condition-1:
    dag:
      tasks:
        condition-2:
          componentRef:
            name: comp-condition-2
          dependentTasks:
          - fetch-data-with-retry
          - validate-data-quality
          inputs:
            artifacts:
              pipelinechannel--fetch-data-with-retry-output_path:
                taskOutputArtifact:
                  outputArtifactKey: output_path
                  producerTask: fetch-data-with-retry
            parameters:
              pipelinechannel--circuit-breaker-check-Output:
                componentInputParameter: pipelinechannel--circuit-breaker-check-Output
              pipelinechannel--min_memory_gb:
                componentInputParameter: pipelinechannel--min_memory_gb
              pipelinechannel--target_memory_gb:
                componentInputParameter: pipelinechannel--target_memory_gb
              pipelinechannel--validate-data-quality-Output:
                taskOutputParameter:
                  outputParameterKey: Output
                  producerTask: validate-data-quality
          taskInfo:
            name: condition-2
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--validate-data-quality-Output']
              == true
        fetch-data-with-retry:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-fetch-data-with-retry
          inputs:
            parameters:
              max_retries:
                componentInputParameter: pipelinechannel--max_fetch_retries
              timeout_seconds:
                runtimeValue:
                  constant: 30.0
              url:
                componentInputParameter: pipelinechannel--primary_data_url
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: fetch-data-with-retry
        validate-data-quality:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-validate-data-quality
          dependentTasks:
          - fetch-data-with-retry
          inputs:
            artifacts:
              data_path:
                taskOutputArtifact:
                  outputArtifactKey: output_path
                  producerTask: fetch-data-with-retry
            parameters:
              max_null_percentage:
                componentInputParameter: pipelinechannel--max_null_percentage
              min_rows:
                componentInputParameter: pipelinechannel--min_rows
          taskInfo:
            name: validate-data-quality
    inputDefinitions:
      parameters:
        pipelinechannel--circuit-breaker-check-Output:
          parameterType: BOOLEAN
        pipelinechannel--max_fetch_retries:
          parameterType: NUMBER_INTEGER
        pipelinechannel--max_null_percentage:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--min_memory_gb:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--min_rows:
          parameterType: NUMBER_INTEGER
        pipelinechannel--primary_data_url:
          parameterType: STRING
        pipelinechannel--target_memory_gb:
          parameterType: NUMBER_DOUBLE
  comp-condition-2:
    dag:
      tasks:
        adaptive-data-processing:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-adaptive-data-processing
          inputs:
            artifacts:
              data_path:
                componentInputArtifact: pipelinechannel--fetch-data-with-retry-output_path
            parameters:
              min_memory_gb:
                componentInputParameter: pipelinechannel--min_memory_gb
              target_memory_gb:
                componentInputParameter: pipelinechannel--target_memory_gb
          taskInfo:
            name: adaptive-data-processing
    inputDefinitions:
      artifacts:
        pipelinechannel--fetch-data-with-retry-output_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--circuit-breaker-check-Output:
          parameterType: BOOLEAN
        pipelinechannel--min_memory_gb:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--target_memory_gb:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--validate-data-quality-Output:
          parameterType: BOOLEAN
  comp-condition-3:
    dag:
      tasks:
        adaptive-data-processing-2:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-adaptive-data-processing-2
          dependentTasks:
          - generate-fallback-data
          inputs:
            artifacts:
              data_path:
                taskOutputArtifact:
                  outputArtifactKey: output_path
                  producerTask: generate-fallback-data
            parameters:
              min_memory_gb:
                runtimeValue:
                  constant: 0.5
              target_memory_gb:
                runtimeValue:
                  constant: 1.0
          taskInfo:
            name: adaptive-data-processing-2
        generate-fallback-data:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-generate-fallback-data
          inputs:
            parameters:
              rows:
                componentInputParameter: pipelinechannel--fallback_data_rows
          taskInfo:
            name: generate-fallback-data
    inputDefinitions:
      parameters:
        pipelinechannel--circuit-breaker-check-Output:
          parameterType: BOOLEAN
        pipelinechannel--fallback_data_rows:
          parameterType: NUMBER_INTEGER
