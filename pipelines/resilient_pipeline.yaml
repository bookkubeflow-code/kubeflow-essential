  comp-fetch-data-with-retry:
    executorLabel: exec-fetch-data-with-retry
    inputDefinitions:
      parameters:
        max_retries:
          defaultValue: 3.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        timeout_seconds:
